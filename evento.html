<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción a Evento | Vida Plena</title>
    <!-- Tailwind CSS (CDN for simplicity) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B1120;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background-image: radial-gradient(circle at top right, rgba(59,130,246,0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(139,92,246,0.1), transparent 40%);
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-field {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }
    </style>
</head>
<body>

    <div class="glass-panel w-full max-w-md p-8 relative overflow-hidden" id="mainContainer">
        <!-- Loader -->
        <div id="loader" class="absolute inset-0 bg-[#0B1120]/90 z-50 flex flex-col items-center justify-center">
            <div class="w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-slate-400 font-bold">Cargando Evento...</p>
        </div>

        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-purple-500/20 rounded-2xl flex items-center justify-center mx-auto mb-4 text-purple-400">
                <i data-lucide="ticket" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tight" id="evTitle">Nombre del Evento</h1>
            <p class="text-slate-400 mt-2 text-sm flex items-center justify-center gap-2">
                <i data-lucide="calendar" class="w-4 h-4"></i> <span id="evDate">Fecha</span>
            </p>
            <div class="mt-4 inline-block bg-purple-500/10 border border-purple-500/30 text-purple-400 px-4 py-1 rounded-full text-sm font-bold" id="evCost">Costo</div>
        </div>

        <form id="regForm" onsubmit="submitRegistration(event)" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">Nombre Completo</label>
                <input type="text" id="nombre" required class="input-field" placeholder="Ej. Juan Pérez">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">Teléfono / WhatsApp</label>
                <input type="tel" id="telefono" required class="input-field" placeholder="+58 412 1234567">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">Iglesia / Sede</label>
                <input type="text" id="sede" required class="input-field" placeholder="Ej. Vida Plena Acarigua">
            </div>
            
            <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-purple-500/20 transition-all transform hover:scale-[1.02] active:scale-95 mt-6 flex justify-center items-center gap-2">
                <i data-lucide="check-circle" class="w-5 h-5"></i> Confirmar Asistencia
            </button>
        </form>
    </div>

    <script>
        lucide.createIcons();

        // Inicializar Firebase (Misma config de la iglesia)
        const firebaseConfig = {
            apiKey: "AIz" + "aSy" + "CThR" + "CCLz8ULWxrTc6cnldljsBqtLf-078",
            authDomain: "vidaplenacensus.firebaseapp.com",
            projectId: "vidaplenacensus",
            storageBucket: "vidaplenacensus.firebasestorage.app",
            messagingSenderId: "699166689339",
            appId: "1:699166689339:web:54a82bd7f660dacf6db41e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');

        if (!eventId) {
            document.getElementById('mainContainer').innerHTML = '<div class="text-center py-8"><i data-lucide="alert-triangle" class="w-12 h-12 text-red-500 mx-auto mb-4"></i><h2 class="text-xl font-bold text-white mb-2">Enlace Inválido</h2><p class="text-slate-400">El evento no existe o el enlace está incompleto.</p></div>';
            lucide.createIcons();
        } else {
            // Load Event Data
            db.collection('eventos').doc(eventId).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('evTitle').textContent = data.nombre;
                    document.getElementById('evDate').textContent = new Date(data.fecha).toLocaleString();
                    document.getElementById('evCost').textContent = data.costo ? 'Costo: ' + data.costo : 'Entrada Gratis';
                    document.getElementById('loader').style.display = 'none';
                } else {
                    document.getElementById('mainContainer').innerHTML = '<div class="text-center py-8"><i data-lucide="alert-triangle" class="w-12 h-12 text-red-500 mx-auto mb-4"></i><h2 class="text-xl font-bold text-white mb-2">Evento no encontrado</h2><p class="text-slate-400">Este evento ha sido eliminado o no existe.</p></div>';
                    lucide.createIcons();
                }
            }).catch((error) => {
                Swal.fire('Error', 'No se pudo conectar con la base de datos', 'error');
            });
        }

        window.submitRegistration = function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const telefono = document.getElementById('telefono').value;
            const sede = document.getElementById('sede').value;

            const btn = e.target.querySelector('button');
            btn.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Procesando...';
            btn.disabled = true;

            db.collection('inscripciones_evento').add({
                eventId: eventId,
                eventTitle: document.getElementById('evTitle').textContent,
                nombre: nombre,
                telefono: telefono,
                sede: sede,
                fechaRegistro: new Date().toISOString()
            }).then(() => {
                document.getElementById('mainContainer').innerHTML = `
                    <div class="text-center py-8">
                        <div class="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-6 text-emerald-400 shadow-[0_0_30px_rgba(16,185,129,0.3)]">
                            <i data-lucide="check" class="w-10 h-10"></i>
                        </div>
                        <h2 class="text-2xl font-black text-white mb-2">¡Inscripción Exitosa!</h2>
                        <p class="text-slate-400">Te esperamos en <b>${document.getElementById('evTitle').textContent}</b>. Hemos guardado tu cupo.</p>
                    </div>
                `;
                lucide.createIcons();
            }).catch(() => {
                Swal.fire('Error', 'Ocurrió un problema, intenta de nuevo', 'error');
                btn.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5"></i> Confirmar Asistencia';
                btn.disabled = false;
                lucide.createIcons();
            });
        }
    </script>
</body>
</html>
